<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>声を届けるマップ</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #fdfcf0; }
        #map { width: 100vw; height: 100vh; z-index: 1; }
        
        /* 画面上部のタイトルデザイン */
        .header { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: rgba(255, 255, 255, 0.95); 
            padding: 12px 24px; border-radius: 30px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            font-weight: bold; color: #003366; font-size: 16px;
            white-space: nowrap; border: 2px solid #11caa0;
        }
        
        /* 吹き出し（ポップアップ）のデザイン */
        .leaflet-popup-content-wrapper { border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .popup-title { font-weight: bold; color: #003366; margin-bottom: 8px; font-size: 1.1em; border-bottom: 2px solid #11caa0; padding-bottom: 4px;}
        .popup-info { color: #475569; margin: 4px 0; font-size: 0.95em; }
    </style>
</head>
<body>
    <div class="header">声を届ける、実態調査マップ 🌸</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ① マップの初期設定（日本全体がフワッと見えるようにします）
        const map = L.map('map').setView([36.2048, 138.2529], 5);

        // ② 地図のデザイン（OpenStreetMapを使用）
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 18
        }).addTo(map);

        // ③ エリアの文字（例：歌舞伎町）を、地図上の座標（緯度・経度）に変換する魔法
        async function getCoordinates(address) {
            // ※瞬時にピンを立てるため、主要エリアはあらかじめ登録しておきます（みこちゃんのテスト用！）
            const knownLocations = {
                "歌舞伎町": [35.6938, 139.7034],
                "新宿": [35.6909, 139.7002],
                "池袋": [35.7295, 139.7109],
                "渋谷": [35.6580, 139.7016],
                "横浜": [35.4437, 139.6380],
                "東京": [35.6812, 139.7671]
            };
            
            for (let key in knownLocations) {
                if (address.includes(key)) return knownLocations[key];
            }

            // 登録されていない住所は、無料の検索システム（Nominatim）で探します
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address + ' 日本')}`);
                const data = await response.json();
                if (data && data.length > 0) {
                    return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
                }
            } catch (e) {
                console.error("位置情報の取得に失敗しました", e);
            }
            return null; 
        }

        // ④ さきほど届いた「data.json」を読み込んで、ピンを立てる！
        async function loadData() {
            try {
                // 最新のデータを取得
                const response = await fetch('data.json?' + new Date().getTime());
                const data = await response.json();

                for (const item of data) {
                    if (!item.area) continue;

                    const coords = await getCoordinates(item.area);

                    if (coords) {
                        // ピンを配置
                        const marker = L.marker(coords).addTo(map);
                        
                        // 吹き出し（ポップアップ）の中身を作成
                        const popupContent = `
                            <div class="popup-title">${item.nickname || '匿名のサバイバー'} さん</div>
                            <div class="popup-info">📍 エリア：${item.area}</div>
                            <div class="popup-info">⏱️ 期間：${item.duration || '未記入'}</div>
                        `;
                        marker.bindPopup(popupContent);
                    }
                }
            } catch (error) {
                console.error('データの読み込みに失敗しました:', error);
            }
        }

        // プログラム実行！
        loadData();
    </script>
</body>
</html>
